name: Flutter Android CI build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      HMAC_SECRET_KEY: ${{ secrets.HMAC_SECRET_KEY }}
      ENCRYPTION_KEY: ${{ secrets.HMAC_SECRET_KEY }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEY_DN: ${{ secrets.KEY_DN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android SDK and NDK packages
        run: |
          set -euo pipefail

          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/android-sdk}"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          mkdir -p "$ANDROID_SDK_ROOT"

          if [ ! -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
            TEMP_ZIP="$(mktemp /tmp/cmdline-tools-XXXXXX.zip)"
            curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o "$TEMP_ZIP"
            unzip -q "$TEMP_ZIP" -d "$ANDROID_SDK_ROOT/cmdline-tools"
            rm -f "$TEMP_ZIP"
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          fi

          printf 'y\n' | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358"

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"

      - name: Configure Flutter SDK path
        run: |
          FLUTTER_ROOT=$(dirname "$(dirname "$(readlink -f "$(which flutter)")")")
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> "$GITHUB_ENV"

      - name: Prepare icon assets
        run: |
          if [ -f app_assets/icon.png ]; then
            echo "Using app_assets/icon.png"
          else
            echo "Missing app_assets/icon.png. Add your launcher icon to app_assets/icon.png to enable automatic icon replacement." >&2
            exit 1
          fi

      - name: Prepare Android signing
        run: |
          set -e
          keytool -genkeypair \
            -v \
            -keystore android/app/upload-keystore.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "$KEY_DN"

          cat > android/app/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build Android APK
        run: |
          flutter build apk --release \
            --split-per-abi \
            --android-skip-build-dependency-validation \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=HMAC_SECRET_KEY="$HMAC_SECRET_KEY" \
            --dart-define=ENCRYPTION_KEY="$ENCRYPTION_KEY"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ottking-app-release-apk
          path: build/app/outputs/flutter-apk/*-release.apk
