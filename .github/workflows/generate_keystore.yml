name: 0. Generate & Save Keystore (শুধু একবার চালাও)

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PASSWORD: "ottking_secure_pass_2026"
      KEY_ALIAS: "ottking_alias"
      KEY_PASSWORD: "ottking_secure_pass_2026"
      KEY_DN: "CN=ottking, OU=Development, O=oTtking, L=Dhaka, S=Dhaka, C=BD"

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore and save to key/data.txt
        run: |
          set -e

          mkdir -p key

          # Keystore জেনারেট করো
          keytool -genkeypair \
            -v \
            -keystore key/upload-keystore.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "$KEY_DN"

          # Base64 করে key/data.txt এ সেভ করো
          base64 -w 0 key/upload-keystore.jks > key/data.txt

          echo ""
          echo "✅ key/data.txt তৈরি হয়েছে ($(wc -c < key/data.txt) bytes)"

          # .jks ফাইল মুছে দাও, শুধু data.txt রাখো
          rm key/upload-keystore.jks

      - name: Commit key/data.txt to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add key/data.txt
          git commit -m "chore: add signing keystore [skip ci]"
          git push
